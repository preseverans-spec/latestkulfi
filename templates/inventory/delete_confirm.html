{% extends 'inventory/base.html' %}

{% block title %}Confirm Delete - Kulfi{% endblock %}

{% block content %}
<h1 class="page-title"><i class="fas fa-trash"></i> Confirm Delete</h1>

<div class="row">
    <div class="col-lg-6 offset-lg-3">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Are you sure?</h5>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete <strong>{{ user.username }}</strong>?</p>
                <p class="text-danger"><small><i class="fas fa-warning"></i> This action cannot be undone.</small></p>
                
                <form method="POST" class="d-flex gap-2 justify-content-end">
                    {% csrf_token %}
                    <a href="{% url 'user_list' %}" class="btn btn-secondary" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href=this.href; } return false;">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-check"></i> Delete User
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
