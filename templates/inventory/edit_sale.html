{% extends 'inventory/base.html' %}

{% block title %}Edit Sale - Kulfi{% endblock %}

{% block content %}
<h1 class="page-title"><i class="fas fa-edit"></i> Edit Sale</h1>

<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Sale Details</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Product</label>
                        <input type="text" class="form-control" value="{{ sale.product.name }}" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Unit Price</label>
                        <input type="text" class="form-control" value="₹{{ sale.unit_price|floatformat:2 }}" disabled>
                    </div>

                    <div class="mb-3">
                        <label for="quantity" class="form-label">Quantity <span class="text-danger">*</span></label>
                        <input type="number" id="quantity" name="quantity" class="form-control" value="{{ sale.quantity }}" min="1" required>
                        <small class="text-muted">Current stock: {{ sale.product.current_stock }}</small>
                    </div>

                    <div class="mb-3">
                        <label for="sale_date" class="form-label">Sale Date <span class="text-danger">*</span></label>
                        <input type="date" id="sale_date" name="sale_date" class="form-control" value="{{ sale.sale_date|date:'Y-m-d' }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea id="notes" name="notes" class="form-control" rows="3">{{ sale.notes }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Total Price</label>
                        <input type="text" class="form-control" id="total-price" value="₹{{ sale.total_price|floatformat:2 }}" disabled>
                    </div>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg d-flex align-items-center gap-2">
                            <i class="fas fa-save fa-lg"></i> Update Sale
                        </button>
                        <a href="{% url 'view_sales' %}" class="btn btn-secondary btn-lg d-flex align-items-center gap-2" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href=this.href; } return false;">
                            <i class="fas fa-times fa-lg"></i> Cancel
                        </a>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-primary btn-lg d-flex align-items-center gap-2">
                            <i class="fas fa-home fa-lg"></i> Home
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const quantityInput = document.getElementById('quantity');
    const unitPrice = {{ sale.unit_price }};
    const totalPriceDisplay = document.getElementById('total-price');

    function updateTotal() {
        const qty = parseFloat(quantityInput.value) || 0;
        const total = (unitPrice * qty).toFixed(2);
        totalPriceDisplay.value = '₹' + total;
    }

    quantityInput.addEventListener('input', updateTotal);
    updateTotal();
});
</script>
{% endblock %}
